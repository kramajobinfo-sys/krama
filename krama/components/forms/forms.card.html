<!-- @dsCard group="Components" viewport="700x420" name="Forms — input, select, checkbox, switch" subtitle="Input, Textarea, Select, Checkbox, Switch" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body{margin:0;padding:24px;background:var(--surface-page);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 24px;max-width:640px}
  i[data-lucide]{width:16px;height:16px}
</style></head>
<body><div id="root"></div>
<script type="text/babel">
function Demo(){
  const { Input, Textarea, Select, Checkbox, Switch } = window.KramaDesignSystem_1a6f65;
  const [remote,setRemote]=React.useState(true);
  const [save,setSave]=React.useState(false);
  return (
    <div className="grid">
      <Input label="Email" type="email" placeholder="you@example.com" iconLeft={<i data-lucide="mail"></i>} />
      <Input label="Job title" error="This field is required" defaultValue="Acc" />
      <Select label="Category" placeholder="All categories" options={["IT","Finance","Marketing","Engineering","HR"]} />
      <Input label="Salary (USD/mo)" hint="Range shown publicly" placeholder="800 – 1,200" />
      <div style={{gridColumn:'1 / -1'}}>
        <Textarea label="Job description" rows={3} placeholder="Describe the role…" />
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <Checkbox label="Remote only" checked={remote} onChange={e=>setRemote(e.target.checked)} />
        <Checkbox label="Verified employers" checked={save} onChange={e=>setSave(e.target.checked)} />
      </div>
      <div style={{display:'flex',alignItems:'center'}}>
        <Switch label="Open to remote work" checked={remote} onChange={setRemote} />
      </div>
    </div>
  );
}
function mount(){
  if(!window.KramaDesignSystem_1a6f65){return setTimeout(mount,40);}
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide && window.lucide.createIcons(), 60);
}
mount();
</script></body></html>
