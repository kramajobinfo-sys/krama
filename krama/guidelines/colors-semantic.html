<!-- @dsCard group="Colors" viewport="700x160" name="Semantic feedback" subtitle="Success · Warning · Danger · Info" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-sans);display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .cell{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
  .bar{height:40px}
  .body{padding:10px 12px}
  .name{font-weight:700;font-size:13px;color:var(--text-strong)}
  .pill{display:inline-block;margin-top:8px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:var(--radius-pill)}
  .mono{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);margin-top:6px}
</style></head><body>
  <div class="cell"><div class="bar" style="background:var(--success)"></div><div class="body"><div class="name">Success</div><span class="pill" style="background:var(--success-subtle);color:var(--success)">Approved</span><div class="mono">--success</div></div></div>
  <div class="cell"><div class="bar" style="background:var(--warning)"></div><div class="body"><div class="name">Warning</div><span class="pill" style="background:var(--warning-subtle);color:var(--warning)">Pending</span><div class="mono">--warning</div></div></div>
  <div class="cell"><div class="bar" style="background:var(--danger)"></div><div class="body"><div class="name">Danger</div><span class="pill" style="background:var(--danger-subtle);color:var(--danger)">Rejected</span><div class="mono">--danger</div></div></div>
  <div class="cell"><div class="bar" style="background:var(--info)"></div><div class="body"><div class="name">Info</div><span class="pill" style="background:var(--info-subtle);color:var(--info)">Update</span><div class="mono">--info</div></div></div>
</body></html>
