<!-- @dsCard group="Type" viewport="700x200" name="Display — Sora" subtitle="Headings, tight tracking & leading" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-display)}
  .line{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--border-subtle);padding:7px 0}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);min-width:74px}
  .t{color:var(--text-strong);font-weight:700;letter-spacing:var(--tracking-tight);line-height:1.05;white-space:nowrap}
</style></head><body>
  <div class="line"><span class="meta">5xl / 800</span><span class="t" style="font-size:var(--text-5xl);font-weight:800">Find work that fits</span></div>
  <div class="line"><span class="meta">3xl / 700</span><span class="t" style="font-size:var(--text-3xl)">Featured jobs near you</span></div>
  <div class="line"><span class="meta">2xl / 700</span><span class="t" style="font-size:var(--text-2xl)">Senior Accountant</span></div>
  <div class="line"><span class="meta">xl / 600</span><span class="t" style="font-size:var(--text-xl);font-weight:600">Company overview</span></div>
</body></html>
