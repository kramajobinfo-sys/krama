<!-- @dsCard group="Brand" viewport="700x180" name="Krama weave motif" subtitle="Brand texture — subtle, never loud" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:0;background:var(--surface-card);font-family:var(--font-sans);display:flex;height:180px}
  .swatch{flex:1;display:flex;align-items:flex-end;padding:14px}
  .a{background:url('../assets/krama-pattern.svg');background-size:48px}
  .b{background:var(--teal-800);position:relative;overflow:hidden}
  .b .ov{position:absolute;inset:0;background:url('../assets/krama-pattern.svg');background-size:64px;opacity:.10}
  .tag{position:relative;z-index:1;background:rgba(255,255,255,.92);color:var(--stone-800);font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--radius-pill)}
  .tag.l{background:rgba(255,255,255,.16);color:#fff}
</style></head><body>
  <div class="swatch a"><span class="tag">Full weave · empty states, hero edges</span></div>
  <div class="swatch b"><span class="ov"></span><span class="tag l">10% overlay on teal · CTA bands</span></div>
</body></html>
