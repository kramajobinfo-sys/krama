<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation / shadows" subtitle="Warm-tinted, layered · sm → xl" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:28px 20px;background:var(--surface-card);font-family:var(--font-sans);display:flex;gap:24px;align-items:center;justify-content:center}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:96px;height:64px;background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border-subtle)}
  .n{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
</style></head><body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="n">md</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="n">lg</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="n">xl</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-brand);border-color:var(--teal-200)"></div><span class="n">brand</span></div>
</body></html>
