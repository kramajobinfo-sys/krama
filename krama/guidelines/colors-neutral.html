<!-- @dsCard group="Colors" viewport="700x150" name="Stone — warm neutrals" subtitle="Page, surfaces, text, borders" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-sans)}
  .row{display:flex;gap:6px}
  .sw{flex:1;border-radius:var(--radius-sm);height:64px;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box;border:1px solid var(--border-subtle)}
  .sw span{font-size:10px;font-weight:600;font-family:var(--font-mono)}
  .lbl{margin-top:10px;font-size:12px;color:var(--text-muted)}
  b{color:var(--text-strong)}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--stone-0)"><span style="color:var(--stone-600)">0</span></div>
  <div class="sw" style="background:var(--stone-50)"><span style="color:var(--stone-600)">50</span></div>
  <div class="sw" style="background:var(--stone-100)"><span style="color:var(--stone-600)">100</span></div>
  <div class="sw" style="background:var(--stone-200)"><span style="color:var(--stone-700)">200</span></div>
  <div class="sw" style="background:var(--stone-300)"><span style="color:var(--stone-700)">300</span></div>
  <div class="sw" style="background:var(--stone-400)"><span style="color:#fff">400</span></div>
  <div class="sw" style="background:var(--stone-500)"><span style="color:#fff">500</span></div>
  <div class="sw" style="background:var(--stone-600)"><span style="color:#fff">600</span></div>
  <div class="sw" style="background:var(--stone-700)"><span style="color:#fff">700</span></div>
  <div class="sw" style="background:var(--stone-800)"><span style="color:#fff">800</span></div>
  <div class="sw" style="background:var(--stone-900)"><span style="color:#fff">900</span></div>
  <div class="sw" style="background:var(--stone-950)"><span style="color:#fff">950</span></div>
</div>
<div class="lbl">Page <b>--stone-50</b> · cards <b>--stone-0</b> · body text <b>--stone-700</b> · headings <b>--stone-900</b> · borders <b>--stone-200</b></div>
</body></html>
