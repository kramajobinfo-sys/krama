<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="xs 4 → xl 20 → pill" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-sans);display:flex;gap:18px;align-items:center}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:72px;height:56px;background:var(--stone-100);border:1.5px solid var(--teal-500)}
  .n{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
</style></head><body>
  <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="n">xs · 4</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="n">sm · 6</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="n">md · 10</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="n">lg · 14</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="n">xl · 20</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="n">pill</span></div>
</body></html>
