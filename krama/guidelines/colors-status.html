<!-- @dsCard group="Colors" viewport="700x130" name="Workflow status badges" subtitle="Job & company lifecycle states" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 18px;background:var(--surface-card);font-family:var(--font-sans);display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .b{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:5px 12px;border-radius:var(--radius-pill)}
  .dot{width:7px;height:7px;border-radius:50%}
</style></head><body>
  <span class="b" style="background:var(--status-draft-bg);color:var(--status-draft-fg)"><i class="dot" style="background:currentColor"></i>Draft</span>
  <span class="b" style="background:var(--status-pending-bg);color:var(--status-pending-fg)"><i class="dot" style="background:currentColor"></i>Pending approval</span>
  <span class="b" style="background:var(--status-published-bg);color:var(--status-published-fg)"><i class="dot" style="background:currentColor"></i>Published</span>
  <span class="b" style="background:var(--status-rejected-bg);color:var(--status-rejected-fg)"><i class="dot" style="background:currentColor"></i>Rejected</span>
  <span class="b" style="background:var(--status-closed-bg);color:var(--status-closed-fg)"><i class="dot" style="background:currentColor"></i>Closed</span>
</body></html>
