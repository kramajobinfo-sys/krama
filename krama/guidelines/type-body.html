<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-sans);color:var(--text-body)}
  .row{display:flex;align-items:baseline;gap:14px;padding:5px 0}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);min-width:74px}
  .eyebrow{margin-bottom:6px}
</style></head><body>
  <div class="eyebrow">Verified employer</div>
  <div class="row"><span class="meta">lg / 500</span><span style="font-size:var(--text-lg);font-weight:500;color:var(--text-strong)">Lead paragraph — set the scene for the role.</span></div>
  <div class="row"><span class="meta">base / 400</span><span style="font-size:var(--text-base)">Body copy at 15px / 1.5. Reach 40,000+ verified candidates across Cambodia and apply in two clicks.</span></div>
  <div class="row"><span class="meta">sm / 500</span><span style="font-size:var(--text-sm);font-weight:500">Secondary label · 13px medium</span></div>
  <div class="row"><span class="meta">xs / 600</span><span style="font-size:var(--text-xs);font-weight:600;color:var(--text-muted)">Caption / metadata · 12px</span></div>
</body></html>
