<!-- @dsCard group="Colors" viewport="700x150" name="Banyan Teal — primary" subtitle="Brand primary scale 50→950" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-sans)}
  .row{display:flex;gap:6px}
  .sw{flex:1;border-radius:var(--radius-sm);height:64px;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box}
  .sw span{font-size:10px;font-weight:600;font-family:var(--font-mono)}
  .lbl{margin-top:10px;font-size:12px;color:var(--text-muted)}
  b{color:var(--text-strong)}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--teal-50)"><span style="color:var(--teal-700)">50</span></div>
  <div class="sw" style="background:var(--teal-100)"><span style="color:var(--teal-700)">100</span></div>
  <div class="sw" style="background:var(--teal-200)"><span style="color:var(--teal-800)">200</span></div>
  <div class="sw" style="background:var(--teal-300)"><span style="color:var(--teal-900)">300</span></div>
  <div class="sw" style="background:var(--teal-400)"><span style="color:#fff">400</span></div>
  <div class="sw" style="background:var(--teal-500)"><span style="color:#fff">500</span></div>
  <div class="sw" style="background:var(--teal-600)"><span style="color:#fff">600</span></div>
  <div class="sw" style="background:var(--teal-700)"><span style="color:#fff">700</span></div>
  <div class="sw" style="background:var(--teal-800)"><span style="color:#fff">800</span></div>
  <div class="sw" style="background:var(--teal-900)"><span style="color:#fff">900</span></div>
  <div class="sw" style="background:var(--teal-950)"><span style="color:#fff">950</span></div>
</div>
<div class="lbl"><b>--teal-600</b> #0C7E6B is <b>--brand</b> · primary buttons, links, active nav</div>
</body></html>
