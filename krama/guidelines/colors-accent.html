<!-- @dsCard group="Colors" viewport="700x150" name="Saffron — accent" subtitle="Accent scale 50→950, used sparingly" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-sans)}
  .row{display:flex;gap:6px}
  .sw{flex:1;border-radius:var(--radius-sm);height:64px;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box}
  .sw span{font-size:10px;font-weight:600;font-family:var(--font-mono)}
  .lbl{margin-top:10px;font-size:12px;color:var(--text-muted)}
  b{color:var(--text-strong)}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--saffron-50)"><span style="color:var(--saffron-700)">50</span></div>
  <div class="sw" style="background:var(--saffron-100)"><span style="color:var(--saffron-700)">100</span></div>
  <div class="sw" style="background:var(--saffron-200)"><span style="color:var(--saffron-800)">200</span></div>
  <div class="sw" style="background:var(--saffron-300)"><span style="color:var(--saffron-900)">300</span></div>
  <div class="sw" style="background:var(--saffron-400)"><span style="color:#fff">400</span></div>
  <div class="sw" style="background:var(--saffron-500)"><span style="color:#fff">500</span></div>
  <div class="sw" style="background:var(--saffron-600)"><span style="color:#fff">600</span></div>
  <div class="sw" style="background:var(--saffron-700)"><span style="color:#fff">700</span></div>
  <div class="sw" style="background:var(--saffron-800)"><span style="color:#fff">800</span></div>
  <div class="sw" style="background:var(--saffron-900)"><span style="color:#fff">900</span></div>
  <div class="sw" style="background:var(--saffron-950)"><span style="color:#fff">950</span></div>
</div>
<div class="lbl"><b>--saffron-500</b> #F26B1F is <b>--accent</b> · one emphasis per screen, featured tags, hero CTA</div>
</body></html>
