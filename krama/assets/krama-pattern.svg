  <defs>
    <pattern id="krama" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#0C7E6B"></rect>
      <rect x="0" y="0" width="20" height="20" fill="#0E8C77"></rect>
      <rect x="20" y="20" width="20" height="20" fill="#0E8C77"></rect>
      <rect x="20" y="0" width="20" height="20" fill="#0C7E6B"></rect>
      <rect x="0" y="20" width="20" height="20" fill="#0C7E6B"></rect>
      <rect x="18" y="0" width="4" height="40" fill="#F26B1F" opacity="0.85"></rect>
      <rect x="0" y="18" width="40" height="4" fill="#F26B1F" opacity="0.85"></rect>
    </pattern>
  </defs>
