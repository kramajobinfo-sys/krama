<script>
class ErrBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  componentDidCatch(err){ console.error("Employer app error:", err && err.stack || err); }
  render(){
    if(this.state.err){
      return React.createElement("div",{style:{padding:"40px",fontFamily:"var(--font-sans)",color:"var(--danger)"}},
        React.createElement("h2",{style:{color:"var(--text-strong)"}},"Something went wrong"),
        React.createElement("pre",{style:{whiteSpace:"pre-wrap",fontSize:"12px",color:"var(--text-muted)"}}, String(this.state.err && (this.state.err.stack||this.state.err.message) || this.state.err)));
    }
    return this.props.children;
  }
}
function mount(){
  if(!window.KramaEmployerApp||!window.KramaDesignSystem_1a6f65){return setTimeout(mount,40);}
  ReactDOM.createRoot(document.getElementById("root")).render(
    React.createElement(ErrBoundary,null,React.createElement(window.KramaEmployerApp))
  );
}
mount();
</script>
