<body>
<div id="root"></div>
<script>
var JSX_FILES = ['chrome.jsx','home.jsx','jobs.jsx','job-detail.jsx','company-detail.jsx','auth.jsx','apply.jsx','pages.jsx','chat.jsx','app.jsx'];
var JSX_V = 157;
function showLoadError(msg) {
  var el = document.getElementById('root');
  el.innerHTML = '<div style="padding:40px;font-family:sans-serif"><h2 style="color:#c00">Failed to load</h2><pre style="font-size:13px;color:#555;white-space:pre-wrap">' + msg + '</pre></div>';
}
// Resolve JSX paths against the current directory so fetch always gets an
// absolute URL (a bare relative URL can throw "Failed to parse URL" when the
// document base URL isn't usable).
var JSX_BASE = (function(){
  try { return new URL('.', document.baseURI || window.location.href).href; }
  catch (e) { return ''; }
})();
// Fetch all in parallel, compile+execute in order
Promise.all(JSX_FILES.map(function(file) {
  return fetch(JSX_BASE + file + '?v=' + JSX_V).then(function(r){
    if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching ' + file);
    return r.text();
  });
})).then(function(sources) {
  var errors = [];
  sources.forEach(function(src, i) {
    try {
      var compiled = Babel.transform(src, { presets: ['react'] }).code;
      var s = document.createElement('script');
      s.text = compiled;
      document.head.appendChild(s);
    } catch(e) {
      errors.push(JSX_FILES[i] + ': ' + (e && e.message || e));
      console.error('Failed to compile ' + JSX_FILES[i] + ':', e);
    }
  });
  if (errors.length) showLoadError('Compile error(s):\n' + errors.join('\n'));
}).catch(function(e){
  console.error('Failed to fetch JSX files:', e);
  showLoadError('Network error loading JSX files:\n' + (e && e.message || e));
});
</script>
<script>
class ErrBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  componentDidCatch(err){ console.error("Public site error:", err && err.stack || err); }
  render(){
    if(this.state.err){
      return React.createElement("div",{style:{padding:"40px",fontFamily:"var(--font-sans)",color:"var(--danger)"}},
        React.createElement("h2",{style:{color:"var(--text-strong)"}},"Something went wrong"),
        React.createElement("pre",{style:{whiteSpace:"pre-wrap",fontSize:"12px",color:"var(--text-muted)"}},
          String(this.state.err && (this.state.err.stack||this.state.err.message) || this.state.err)));
    }
    return this.props.children;
  }
}
function mount(){
  if(!window.KramaPublicApp||!window.KramaDesignSystem_1a6f65){return setTimeout(mount,40);}
  ReactDOM.createRoot(document.getElementById("root")).render(
    React.createElement(ErrBoundary,null,React.createElement(window.KramaPublicApp))
  );
}
mount();
</script>
